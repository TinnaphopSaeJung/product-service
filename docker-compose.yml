services:
  postgres:
    image: postgres:16
    container_name: product_service_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: product_db
    ports:
      - "5433:5432"
    volumes:
      - product_service_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product_service_api
    environment:
      APP_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_NAME: product_db
      DB_SSLMODE: disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  test:
    profiles:
      - test
    image: golang:1.25-alpine
    container_name: product_service_test
    working_dir: /app
    volumes:
      - .:/app
    environment:
      TEST_DB_HOST: postgres
      TEST_DB_PORT: 5432
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: 1234
      TEST_DB_NAME: product_test
      TEST_DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    command: go test ./... -v -count=1 -p 1

volumes:
  product_service_pg_data: